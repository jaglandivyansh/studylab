<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>StudyLab — Online Masterclass</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* === WIX-STYLE PREMIUM TEMPLATE WITH BLUE ACCENT === */
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Light Theme */
  --bg: #F8FAFC;
  --bg2: #FFFFFF;
  --card: #FFFFFF;
  --card2: #F1F5F9;
  --border: #E2E8F0;
  --border2: #CBD5E1;
  /* New Royal Blue Accent */
  --accent: #2563EB; 
  --accent2: #1D4ED8;
  --text: #0F172A;
  --muted: #475569;
  --subtle: #94A3B8;
  --hero-bg: #F8FAFC; /* Clean white/gray hero for light mode */
  --shadow-card: 0 12px 30px -10px rgba(0,0,0,0.05);
  --shadow-hover: 0 20px 40px -10px rgba(37, 99, 235, 0.15);
  --radius: 20px;
}

:root[data-theme="dark"] {
  /* Dark Theme */
  --bg: #0B0F19;
  --bg2: #111827;
  --card: #111827;
  --card2: #1F2937;
  --border: #374151;
  --border2: #4B5563;
  /* Bright Blue Accent for Dark Mode */
  --accent: #3B82F6; 
  --accent2: #60A5FA;
  --text: #F8FAFC;
  --muted: #94A3B8;
  --subtle: #64748B;
  --hero-bg: #020617;
  --shadow-card: 0 12px 30px -10px rgba(0,0,0,0.3);
  --shadow-hover: 0 20px 40px -10px rgba(59, 130, 246, 0.2);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  transition: background-color 0.3s ease, color 0.3s ease;
}

/* HEADER WITH BLACK/WHITE & BLUE LOGO */
.wix-header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.02);
}
.wix-header .logo {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.03em;
}
.wix-header .logo span { 
  color: var(--accent); /* Uses the new Blue accent */
}

/* HERO SECTION */
.wix-hero {
  background: var(--hero-bg);
  color: var(--text);
  padding: 100px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
}
.wix-hero::after {
  content: '';
  position: absolute;
  top: -50%; left: 50%;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(37, 99, 235, 0.1) 0%, rgba(0,0,0,0) 70%);
  transform: translateX(-50%);
  z-index: 0;
}
:root[data-theme="dark"] .wix-hero::after {
  background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(0,0,0,0) 70%);
}
.wix-hero-content {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
}
.wix-hero h1 {
  font-size: 3.5rem;
  font-weight: 800;
  margin-bottom: 20px;
  line-height: 1.1;
  letter-spacing: -0.04em;
}
.wix-hero p {
  font-size: 1.15rem;
  color: var(--muted);
  margin-bottom: 30px;
}

/* HIDE HERO & HEADER WHEN QUIZ STARTS */
body:has(.qo) .hide-on-quiz, 
body:has(.cw) .hide-on-quiz {
  display: none !important;
}

/* MAIN APP CONTAINER */
#app {
  max-width: 1200px;
  margin: 0 auto;
  padding: 60px 20px;
}

/* SMART GRID FOR SUBJECTS */
#app:has(.subj-row) {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 30px;
}

/* SUBJECT CARDS */
.subj-row {
  display: flex;
  flex-direction: column !important;
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-card);
  cursor: pointer;
  overflow: hidden;
  transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  min-height: auto !important;
  margin-bottom: 0 !important;
}
.subj-row:hover {
  transform: translateY(-8px);
  box-shadow: var(--shadow-hover);
  border-color: var(--accent);
}
.sym-panel {
  width: 100% !important;
  height: 180px !important;
  background: linear-gradient(135deg, var(--card2), var(--border));
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: none !important;
  position: relative;
}
.float-sym {
  font-size: 4rem;
  animation: none !important;
  opacity: 1 !important;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.08));
}
.content-panel {
  padding: 30px !important;
  flex: 1;
  display: flex;
  flex-direction: column;
  border-left: none !important;
  background: transparent !important;
}

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 26px; border-radius: 99px; font-family: inherit;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
  border: 1px solid var(--border2); background: var(--card); color: var(--text);
  transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
}
.btn:hover { background: var(--card2); transform: translateY(-2px); }
.btnp {
  background: var(--accent); border-color: var(--accent); color: #fff;
  box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
}
.btnp:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; transform: translateY(-2px); }
.btng { background: transparent; border-color: transparent; color: var(--muted); box-shadow: none; }
.btng:hover { background: var(--card2); border-color: var(--border); color: var(--text); transform: none; }

/* QUIZ OPTIONS */
.qo {
  width: 100%; padding: 18px 24px; border-radius: 16px; border: 2px solid var(--border);
  background: var(--card); color: var(--text); font-family: inherit; font-size: 1rem;
  cursor: pointer; text-align: left; display: flex; gap: 16px; margin-bottom: 14px;
  transition: all 0.2s; font-weight: 500; align-items: center;
}
.qo:hover:not(:disabled) {
  border-color: var(--accent); background: var(--bg); transform: translateX(6px);
}
.qo.ok { border-color: #10B981; background: rgba(16, 185, 129, 0.05); color: #059669; }
.qo.no { border-color: #EF4444; background: rgba(239, 68, 68, 0.05); color: #DC2626; }
.qo:disabled { cursor: default; opacity: 0.8; }

/* FLASHCARDS */
.cw { perspective: 2000px; height: 350px; cursor: pointer; margin-bottom: 30px; }
.ci { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
.ci.fl { transform: rotateY(180deg); }
.cf, .cb {
  position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--radius);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px; text-align: center; border: 1px solid var(--border);
  background: var(--card); box-shadow: var(--shadow-card); font-size: 1.2rem; font-weight: 500;
}
.cb { transform: rotateY(180deg); border-color: var(--accent); background: var(--card2); }

/* PROGRESS BAR */
.pb { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 30px; }
.pf { height: 100%; border-radius: 99px; transition: width 0.5s ease; background: var(--accent); }

/* INPUTS & MISC */
.inp { background: var(--bg); border: 2px solid var(--border); border-radius: 12px; color: var(--text); font-family: inherit; font-size: 1rem; padding: 14px 20px; outline: none; width: 100%; transition: border-color 0.2s; }
.inp:focus { border-color: var(--accent); }
.tag { font-size: 0.7rem; padding: 5px 12px; border-radius: 99px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
.sc, .mc { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; cursor: pointer; display: flex; align-items: center; gap: 16px; transition: all 0.2s; box-shadow: var(--shadow-card); }
.mc { flex-direction: column; text-align: center; min-width: 200px; }
.sc:hover, .mc:hover { transform: translateY(-4px); border-color: var(--accent); }
.hrow { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-radius: 12px; background: var(--card2); margin-bottom: 8px; font-weight: 600; border: 1px solid var(--border); }
.stb { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; text-align: center; margin-bottom: 24px; box-shadow: var(--shadow-card); }

/* TOAST */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 14px 28px; border-radius: 99px; font-size: 0.9rem; font-weight: 600; z-index: 9999; pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: all 0.3s ease; }

/* THEME TOGGLE */
.theme-toggle { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.5rem; box-shadow: var(--shadow-hover); transition: all 0.2s; z-index: 1000; }
.theme-toggle:hover { transform: scale(1.1) rotate(15deg); border-color: var(--accent); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* REFINED STARS */
.star { font-size: 2rem; cursor: pointer; transition: transform 0.2s; color: var(--border2); }
.star:hover { transform: scale(1.2); }
.star.lit { color: #F59E0B; filter: drop-shadow(0 0 12px rgba(245,158,11,0.4)); }

/* Responsive */
@media(max-width: 768px) {
  .wix-header { padding: 15px 20px; }
  .wix-hero { padding: 60px 15px; }
  .wix-hero h1 { font-size: 2.5rem; }
  #app { padding: 30px 15px; }
  #app:has(.subj-row) { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="wix-header hide-on-quiz">
  <div class="logo">Study<span>Lab</span></div>
</header>

<section class="wix-hero hide-on-quiz">
  <div class="wix-hero-content">
    <h1>Master Your Future</h1>
    <p>Premium online learning for History, Geography, Polity and more. Unlock thousands of curated questions and elevate your knowledge.</p>
    <button class="btn btnp" onclick="document.getElementById('app').scrollIntoView({behavior: 'smooth'})">Explore Courses</button>
  </div>
</section>

<div id="app"></div>
<div id="tc"></div>
<div class="theme-toggle" id="themeToggle" title="Toggle theme">🌓</div>

<script>
window.currentUser = null;

function toast(msg, color) {
  var t = document.createElement("div");
  t.className = "toast";
  if(color) { t.style.background = color; t.style.color = "#fff"; }
  t.innerText = msg;
  document.getElementById("tc").appendChild(t);
  
  // Animation in
  t.animate([
    { opacity: 0, transform: 'translate(-50%, 20px)' },
    { opacity: 1, transform: 'translate(-50%, 0)' }
  ], { duration: 300, easing: 'cubic-bezier(0.4,0,0.2,1)' });

  // Animation out & remove
  setTimeout(function(){ 
    var anim = t.animate([
      { opacity: 1, transform: 'translate(-50%, 0)' },
      { opacity: 0, transform: 'translate(-50%, 20px)' }
    ], { duration: 300, easing: 'ease' });
    
    anim.onfinish = () => t.remove();
  }, 3000);
}

// ========================================
// THEME SYSTEM (Defaults to Light mode for the clean Wix look)
// ========================================
var ThemeManager = {
  isDark: false, 
  
  init: function() {
    var saved = localStorage.getItem('theme');
    if (saved === 'dark') {
      this.isDark = true;
    }
    this.applyTheme();
    
    var toggle = document.getElementById('themeToggle');
    if (toggle) {
      var self = this;
      toggle.onclick = function() {
        self.toggle();
      };
    }
  },
  
  toggle: function() {
    this.isDark = !this.isDark;
    localStorage.setItem('theme', this.isDark ? 'dark' : 'light');
    this.applyTheme();
  },
  
  applyTheme: function() {
    var root = document.documentElement;
    if (this.isDark) {
      root.setAttribute('data-theme', 'dark');
      document.getElementById('themeToggle').innerText = '☀️';
    } else {
      root.setAttribute('data-theme', 'light');
      document.getElementById('themeToggle').innerText = '🌙';
    }
  }
};

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() {
    ThemeManager.init();
    if(typeof render === "function") render();
  });
} else {
  ThemeManager.init();
  if(typeof render === "function") render();
}
</script>
