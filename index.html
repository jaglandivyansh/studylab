<script>
// This script runs BEFORE page render to prevent theme flash
(function() {
  const savedTheme = localStorage.getItem('theme');
  const isDark = savedTheme !== 'light'; // Default to dark
  const root = document.documentElement;
  
  // Apply theme instantly
  root.setAttribute('data-theme', isDark ? 'dark' : 'light');
  
  // Add no-transition class to prevent flash on load
  document.addEventListener('DOMContentLoaded', function() {
    document.body.classList.add('no-transition');
    // Remove it after a brief moment to enable smooth transitions going forward
    setTimeout(function() {
      document.body.classList.remove('no-transition');
    }, 100);
  });
})();
</script>

function toast(msg, color) {
  var t = document.createElement("div");
  t.className = "toast";
  t.innerText = msg;
  document.getElementById("tc").appendChild(t);
  
  t.animate([
    { opacity: 0, transform: 'translate(-50%, 20px)' },
    { opacity: 1, transform: 'translate(-50%, 0)' }
  ], { duration: 300, easing: 'cubic-bezier(0.4,0,0.2,1)' });

  setTimeout(function(){ 
    var anim = t.animate([
      { opacity: 1, transform: 'translate(-50%, 0)' },
      { opacity: 0, transform: 'translate(-50%, 20px)' }
    ], { duration: 300, easing: 'ease' });
    
    anim.onfinish = () => t.remove();
  }, 3000);
}
// Native zero-dependency Confetti!
function throwConfetti() {
  for(let i=0; i<45; i++) {
    let conf = document.createElement('div');
    conf.style.cssText = `position:fixed;width:8px;height:8px;background:hsl(${Math.random()*360},100%,60%);top:-10px;left:${Math.random()*100}vw;z-index:99999;border-radius:${Math.random()>.5?'50%':'2px'};pointer-events:none;transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(conf);
    conf.animate([
      { transform: `translate3d(0,0,0) rotate(0deg)`, opacity: 1 },
      { transform: `translate3d(${(Math.random()-0.5)*250}px, 100vh, 0) rotate(${Math.random()*720}deg)`, opacity: 0 }
    ], { duration: 1500 + Math.random()*1200, easing: 'cubic-bezier(.37,0,.63,1)' }).onfinish = () => conf.remove();
  }
}

// ========================================
// MOBILE DRAWER & HAMBURGER LOGIC
// ========================================
function toggleMobileDrawer() {
  const hamburgerBtn = document.getElementById('nb-hamburger');
  const mobileDrawer = document.getElementById('nb-mobile-drawer');
  
  if (!mobileDrawer) return;

  const isDrawerOpen = mobileDrawer.classList.contains('open');

  if (isDrawerOpen) {
    // Close it
    mobileDrawer.classList.remove('open');
    if(hamburgerBtn) {
        hamburgerBtn.classList.remove('active');
        hamburgerBtn.setAttribute('aria-expanded', 'false');
    }
  } else {
    // Open it
    mobileDrawer.classList.add('open');
    if(hamburgerBtn) {
        hamburgerBtn.classList.add('active');
        hamburgerBtn.setAttribute('aria-expanded', 'true');
    }
  }
}

// Close the drawer if the user presses the Escape key
document.addEventListener('keydown', function(event) {
  const mobileDrawer = document.getElementById('nb-mobile-drawer');
  if (event.key === 'Escape' && mobileDrawer && mobileDrawer.classList.contains('open')) {
    toggleMobileDrawer();
  }
});

// Close the drawer when clicking outside
document.addEventListener('click', function(event) {
  const mobileDrawer = document.getElementById('nb-mobile-drawer');
  const hamburgerBtn = document.getElementById('nb-hamburger');
  
  // Check if drawer is open
  if (mobileDrawer && mobileDrawer.classList.contains('open')) {
    // Check if click is outside both the drawer and hamburger button
    if (!mobileDrawer.contains(event.target) && !hamburgerBtn.contains(event.target)) {
      toggleMobileDrawer();
    }
  }
});

// Attach the click event when page loads
document.addEventListener("DOMContentLoaded", function() {
  const hamburgerBtn = document.getElementById('nb-hamburger');
  if (hamburgerBtn) {
    hamburgerBtn.addEventListener('click', toggleMobileDrawer);
  }
});
// ========================================
// THEME SYSTEM

var ThemeManager = {
  isDark: true, // Defaults to Dark Black/Blue mode
  
  init: function() {
    var saved = localStorage.getItem('theme');
    if (saved === 'light') {
      this.isDark = false;
    }
    this.applyTheme();
    
    var toggle = document.getElementById('themeToggle');
    if (toggle) {
      var self = this;
      toggle.onclick = function() {
        self.toggle();
      };
    }
  },
  
  toggle: function() {
    this.isDark = !this.isDark;
    localStorage.setItem('theme', this.isDark ? 'dark' : 'light');
    this.applyTheme();
  },
  
  applyTheme: function() {
    var root = document.documentElement;
    var toggle = document.getElementById('themeToggle');
    
    if (this.isDark) {
      root.setAttribute('data-theme', 'dark');
      if (toggle) toggle.innerText = '☀️';
    } else {
      root.setAttribute('data-theme', 'light');
      if (toggle) toggle.innerText = '🌙';
    }
  }
};

      setTimeout(function() { 
          loader.remove(); // Removes it completely from the DOM
      }, 400);
  }
}

// Create a global empty object for our questions
window.QD = {}; 

function fetchQuestionsAndStart() {
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTj8Mcj82i7dhdMyI5ikQwA1iG94wPkpqXTHIroNieHaSyKaATwOn7SKfrbr7ac5AbxgLe0Y547cNgu/pub?gid=1671510774&single=true&output=csv";
  const CACHE_KEY = "sl_questions_cache";

  // Helper: build QD from parsed rows
  function buildQD(rows) {
    window.QD = {};
    rows.forEach(function(row) {
      // Trim all keys/values to handle accidental spaces in column headers
      var cleanRow = {};
      Object.keys(row).forEach(function(k) { cleanRow[k.trim()] = (row[k] || "").trim(); });

      var subject = cleanRow["Subject"];
      if (!subject) return;

      var ans = parseInt(cleanRow["Correct Answer (0-3)"], 10);
      if (isNaN(ans) || ans < 0 || ans > 3) return; // skip malformed rows

      var q  = cleanRow["Question"];
      var o1 = cleanRow["Option 1"];
      var o2 = cleanRow["Option 2"];
      var o3 = cleanRow["Option 3"];
      var o4 = cleanRow["Option 4"];
      if (!q || !o1 || !o2 || !o3 || !o4) return; // skip incomplete rows

      if (!window.QD[subject]) window.QD[subject] = [];
      window.QD[subject].push({ q: q, o: [o1, o2, o3, o4], a: ans });
    });
    window.totalQuestions = Object.values(window.QD).reduce(function(sum, arr) { return sum + arr.length; }, 0);
  }

  // Try cache first (instant start on repeat visits)
  function loadFromCache() {
    try {
      var cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        buildQD(JSON.parse(cached));
        if (window.totalQuestions > 0) {
          console.log("\u26a1 Questions from cache (" + window.totalQuestions + ")");
          initializeApp();
          return true;
        }
      }
    } catch(e) {}
    return false;
  }

  // Fetch fresh from Sheets
  function fetchFromSheets(onSuccess, onFail) {
    Papa.parse(SHEET_CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        if (!results.data || !results.data.length) { onFail("Empty data"); return; }
        try { localStorage.setItem(CACHE_KEY, JSON.stringify(results.data)); } catch(e) {}
        buildQD(results.data);
        console.log("\u2705 Live questions loaded! (" + window.totalQuestions + " total)");
        onSuccess();
      },
      error: function(err) { onFail(err); }
    });
  }

  var hadCache = loadFromCache();

  if (hadCache) {
    // App started from cache — silently refresh in background
    fetchFromSheets(function() {
      console.log("\uD83D\uDD04 Questions refreshed in background.");
    }, function(err) {
      console.warn("Background refresh failed (using cache):", err);
    });
  } else {
    // No cache — must fetch before starting
    fetchFromSheets(function() {
      initializeApp();
    }, function(err) {
      console.error("\u274C Failed to fetch questions:", err);
      window.QD = {};
      window.totalQuestions = 0;
      initializeApp(); // start app anyway so UI loads
    });
  }
}

// Start the fetch process as soon as the HTML is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', fetchQuestionsAndStart);
} else {
  fetchQuestionsAndStart(); 
}
</script>

}

@keyframes sl-ripple-pop {
  0%   { transform: translateY(-50%) scale(0);   opacity: 1; }
  60%  { transform: translateY(-50%) scale(1.8); opacity: 0.7; }
  100% { transform: translateY(-50%) scale(2.4); opacity: 0; }
}
</style>

<script>
// ═══════════════════════════════════════════════
//  StudyLab — Swipe Navigation v3
//  Strategy: poll window.currentPage every frame
//  during swipe — no go() patching needed at all.
// ═══════════════════════════════════════════════
(function () {
  var PAGES  = ['home', 'govtupdates', 'shorts', 'digest', 'daily'];
  var THRESH = 52;   // min px to count as swipe
  var VMAX   = 0.65; // dy/dx ratio — above this = vertical scroll, ignore

  // ── DOM: dots ──
  var bar = document.createElement('div');
  bar.id  = 'sl-page-dots';
  PAGES.forEach(function (_, i) {
    var d = document.createElement('div');
    d.className = 'sl-dot';
    bar.appendChild(d);
  });
  document.body.appendChild(bar);

  // ── DOM: ripple ──
  var ripple = document.createElement('div');
  ripple.id  = 'sl-swipe-ripple';
  document.body.appendChild(ripple);

  var _lastPage = null;
  var _dotTimer  = null;

  function refreshDots() {
    var page = window.currentPage || 'home';
    if (page === _lastPage) return;
    _lastPage = page;
    var idx = PAGES.indexOf(page);
    if (idx === -1) { bar.classList.remove('visible'); return; }
    bar.classList.add('visible');
    bar.querySelectorAll('.sl-dot').forEach(function (d, i) {
      d.classList.toggle('active', i === idx);
    });
    clearTimeout(_dotTimer);
    _dotTimer = setTimeout(function () { bar.classList.remove('visible'); }, 2200);
  }

  // Poll currentPage every 200ms — works regardless of how go() is defined
  setInterval(refreshDots, 200);

  // ── Touch state ──
  var sx = 0, sy = 0, st = 0;
  var blocked = false;

  document.addEventListener('touchstart', function (e) {
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
    blocked = false;
  }, { passive: true });

  document.addEventListener('touchmove', function (e) {
    if (blocked) return;
    var dx = Math.abs(e.touches[0].clientX - sx);
    var dy = Math.abs(e.touches[0].clientY - sy);
    // Lock out if predominantly vertical before 20px of horizontal movement
    if (dy > 14 && dy > dx * 1.3) blocked = true;
  }, { passive: true });

  document.addEventListener('touchend', function (e) {
    if (blocked) return;
    var dx  = e.changedTouches[0].clientX - sx;
    var dy  = e.changedTouches[0].clientY - sy;
    var dt  = Date.now() - st;

    // Quality checks
    if (Math.abs(dx) < THRESH) return;              // too short
    if (dt > 500) return;                            // too slow
    if (Math.abs(dy) / Math.abs(dx) > VMAX) return; // too diagonal

    var page = window.currentPage || 'home';
    var idx  = PAGES.indexOf(page);
    if (idx === -1) return; // not a swipeable page

    var next = dx < 0 ? idx + 1 : idx - 1; // left→next, right→prev
    if (next < 0 || next >= PAGES.length) return;

    // Fire ripple on appropriate edge
    ripple.className = '';
    void ripple.offsetWidth; // reflow to restart animation
    ripple.className = 'pop ' + (dx < 0 ? 'right-side' : 'left-side');

    // Show dots immediately on swipe
    bar.classList.add('visible');
    clearTimeout(_dotTimer);

    // Navigate — go() is defined by app.js which loads after this script
    // By the time the user swipes, app.js is always loaded.
    if (typeof go === 'function') go(PAGES[next]);
  }, { passive: true });

})();
</script>
