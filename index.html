<!-- ═══ INSTANT THEME LOADING (Prevents Flash) ═══ -->
<script>
// This script runs BEFORE page render to prevent theme flash
(function() {
  const savedTheme = localStorage.getItem('theme');
  const isDark = savedTheme !== 'light'; // Default to dark
  const root = document.documentElement;
  
  // Grab the meta theme-color tag
  let metaTheme = document.querySelector('meta[name="theme-color"]');

  // Apply theme instantly
  root.setAttribute('data-theme', isDark ? 'dark' : 'light');
  
  // Set Android system bars instantly
  if (metaTheme) {
    metaTheme.setAttribute('content', isDark ? '#0B1120' : '#FFFFFF');
  }
  
  // Add no-transition class to prevent flash on load
  document.addEventListener('DOMContentLoaded', function() {
    document.body.classList.add('no-transition');
    // Remove it after a brief moment to enable smooth transitions going forward
    setTimeout(function() {
      document.body.classList.remove('no-transition');
    }, 100);
  });
})();
</script>

      { opacity: 0, transform: 'translate(-50%, 20px)' }
    ], { duration: 300, easing: 'ease' });
    
    anim.onfinish = () => t.remove();
  }, 3000);
}

// ========================================
// MOBILE DRAWER & HAMBURGER LOGIC
// ========================================
function toggleMobileDrawer() {
  const hamburgerBtn = document.getElementById('nb-hamburger');
  const mobileDrawer = document.getElementById('nb-mobile-drawer');
  
  if (!mobileDrawer) return;

  const isDrawerOpen = mobileDrawer.classList.contains('open');

  if (isDrawerOpen) {
    // Close it
    mobileDrawer.classList.remove('open');
    if(hamburgerBtn) {
        hamburgerBtn.classList.remove('active');
        hamburgerBtn.setAttribute('aria-expanded', 'false');
    }
  } else {
    // Open it
    mobileDrawer.classList.add('open');
    if(hamburgerBtn) {
        hamburgerBtn.classList.add('active');
        hamburgerBtn.setAttribute('aria-expanded', 'true');
    }
  }
}

// Close the drawer if the user presses the Escape key
document.addEventListener('keydown', function(event) {
  const mobileDrawer = document.getElementById('nb-mobile-drawer');
  if (event.key === 'Escape' && mobileDrawer && mobileDrawer.classList.contains('open')) {
    toggleMobileDrawer();
  }
});

// Close the drawer when clicking outside
document.addEventListener('click', function(event) {
  const mobileDrawer = document.getElementById('nb-mobile-drawer');
  const hamburgerBtn = document.getElementById('nb-hamburger');
  
  // Check if drawer is open
  if (mobileDrawer && mobileDrawer.classList.contains('open')) {
    // Check if click is outside both the drawer and hamburger button
    if (!mobileDrawer.contains(event.target) && !hamburgerBtn.contains(event.target)) {
      toggleMobileDrawer();
    }
  }
});

// Attach the click event when page loads
document.addEventListener("DOMContentLoaded", function() {
  const hamburgerBtn = document.getElementById('nb-hamburger');
  if (hamburgerBtn) {
    hamburgerBtn.addEventListener('click', toggleMobileDrawer);
  }
});

// THEME SYSTEM
// ========================================
var ThemeManager = {
  isDark: true, // Defaults to Dark Black/Blue mode
  
  init: function() {
    var saved = localStorage.getItem('theme');
    if (saved === 'light') {
      this.isDark = false;
    }
    this.applyTheme();
    
    var toggle = document.getElementById('themeToggle');
    if (toggle) {
      var self = this;
      toggle.onclick = function() {
        self.toggle();
      };
    }
  },
  
  toggle: function() {
    this.isDark = !this.isDark;
    localStorage.setItem('theme', this.isDark ? 'dark' : 'light');
    this.applyTheme();
  },
  
   applyTheme: function() {
    var root = document.documentElement;
    var toggle = document.getElementById('themeToggle');
    // Grab the meta theme-color tag
    var metaTheme = document.querySelector('meta[name="theme-color"]');
    
    if (this.isDark) {
      root.setAttribute('data-theme', 'dark');
      if (toggle) toggle.innerText = '☀️';
      // Set Android system bars to Dark
      if (metaTheme) metaTheme.setAttribute('content', '#0B1120'); 
    } else {
      root.setAttribute('data-theme', 'light');
      if (toggle) toggle.innerText = '🌙';
      // Set Android system bars to Light
      if (metaTheme) metaTheme.setAttribute('content', '#FFFFFF'); 
    }
  }
};

    "https://docs.google.com/spreadsheets/d/e/2PACX-1vQv_s5bmV80SxNuTpJYdAoIY9jQTdgE-IB7cZV0ufR6LgIfBzREUH1i3pDP1Jskdw/pub?gid=1795942396&single=true&output=csv",
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vQv_s5bmV80SxNuTpJYdAoIY9jQTdgE-IB7cZV0ufR6LgIfBzREUH1i3pDP1Jskdw/pub?gid=393325687&single=true&output=csv",
    // Add as many links as you have tabs. Just make sure each line ends with a comma!
  ];
  
  let completedRequests = 0;
  let hasErrors = false;

  // Loop through every link and download them simultaneously
  SHEET_URLS.forEach(function(url) {
    Papa.parse(url, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        results.data.forEach(function(row) {
          let subject = row["Subject"];
          if (!subject) return; 

          subject = subject.trim();
          
          if (!window.QD[subject]) window.QD[subject] = [];
          
          window.QD[subject].push({
            topic: row["Topic"],
            q: row["Question"],
            o: [row["Option 1"], row["Option 2"], row["Option 3"], row["Option 4"]],
            a: parseInt(row["Correct Answer (0-3)"])
          });
        });
        
        // Track how many sheets have finished downloading
        completedRequests++;
        
        // Only start the app once ALL sheets have successfully loaded
        if (completedRequests === SHEET_URLS.length && !hasErrors) {
          console.log("✅ All subject sheets loaded successfully!");
          window.totalQuestions = Object.values(window.QD).reduce((sum, subjectArray) => sum + subjectArray.length, 0);
          initializeApp();
        }
      },
      error: function(err) {
        console.error("❌ Failed to fetch a sheet:", err);
        hasErrors = true;
        alert("Failed to load some study material. Please check your connection.");
      }
    });
  });
}

// Start the fetch process as soon as the HTML is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', fetchQuestionsAndStart);
} else {
  fetchQuestionsAndStart(); 
}
</script>


<!-- ── SWIPE NAVIGATION v4 ── -->
<style>
/* ── Page dots ── */
#sl-page-dots {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  align-items: center;
  z-index: 9000;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.35s ease;
}
#sl-page-dots.visible { opacity: 1; }
#sl-page-dots .sl-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.22);
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
#sl-page-dots .sl-dot.active {
  width: 20px;
  border-radius: 4px;
  background: var(--accent, #6366f1);
  box-shadow: 0 0 10px var(--accent, #6366f1);
}

/* ── Drawer peek overlay (right-swipe from edge) ── */
#sl-drawer-peek {
  position: fixed;
  top: 0; right: 0;
  width: 80vw; max-width: 320px;
  height: 100%;
  z-index: 9999;
  transform: translateX(100%);
  transition: transform 0.32s cubic-bezier(0.22,1,0.36,1);
  pointer-events: none;
}
#sl-drawer-peek.open {
  transform: translateX(0);
  pointer-events: all;
}
#sl-drawer-scrim {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 9998;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.32s ease;
  backdrop-filter: blur(2px);
}
#sl-drawer-scrim.visible {
  opacity: 1;
  pointer-events: all;
}
</style>

<script>
(function () {
  var NAV_PAGES = ['home', 'govtupdates', 'shorts', 'digest', 'daily'];
  var EDGE_ZONE = 28;  // px from screen edge
  var SWIPE_MIN = 48;  // lower = more responsive
  var TIME_MAX  = 400; // ms max for a swipe gesture
  var _swipeLock = false; // prevent double-fire

  // ── Page indicator dots ──
  var bar = document.createElement('div');
  bar.id = 'sl-page-dots';
  NAV_PAGES.forEach(function () {
    var d = document.createElement('div');
    d.className = 'sl-dot';
    bar.appendChild(d);
  });
  document.body.appendChild(bar);

  var _dotTimer = null;
  function showDots(page) {
    var idx = NAV_PAGES.indexOf(page);
    if (idx === -1) { bar.classList.remove('visible'); return; }
    bar.classList.add('visible');
    bar.querySelectorAll('.sl-dot').forEach(function (d, i) {
      d.classList.toggle('active', i === idx);
    });
    clearTimeout(_dotTimer);
    _dotTimer = setTimeout(function () { bar.classList.remove('visible'); }, 2000);
  }

  // Sync dots to currentPage — poll is fine, it's cheap
  var _lastPage = null;
  setInterval(function () {
    var p = window.currentPage || 'home';
    if (p !== _lastPage) { _lastPage = p; showDots(p); }
  }, 100);

  // ── Right-side swipe drawer ──
  var scrim = document.createElement('div');
  scrim.id = 'sl-drawer-scrim';
  document.body.appendChild(scrim);

  var drawer = document.createElement('div');
  drawer.id = 'sl-drawer-peek';
  document.body.appendChild(drawer);

  document.addEventListener('DOMContentLoaded', function () {
    var orig = document.getElementById('nb-mobile-drawer');
    if (!orig) return;
    var clone = orig.cloneNode(true);
    clone.id = 'sl-drawer-inner';
    clone.removeAttribute('style');
    clone.style.cssText = 'height:100%;background:var(--card);border-left:1px solid var(--border2);padding:60px 20px 40px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;box-shadow:-8px 0 32px rgba(0,0,0,0.4)';
    clone.querySelectorAll('button[data-page]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var p = btn.getAttribute('data-page');
        closeRightDrawer();
        // Wait for go() to be defined (app.js loads after this script)
        if (typeof go === 'function') go(p);
      });
    });
    drawer.appendChild(clone);
  });

  function openRightDrawer()  { drawer.classList.add('open');  scrim.classList.add('visible'); }
  function closeRightDrawer() { drawer.classList.remove('open'); scrim.classList.remove('visible'); }
  scrim.addEventListener('click', closeRightDrawer);

  // ── Safe navigation — always calls go() directly, never history.back() ──
  // history.back() goes through popstate → go() = double render + lag
  // Instead we read history state directly and call go() ourselves
  function safeBack() {
    // Try to get previous state from history
    // If we have a state, use it; otherwise go home
    if (window.history.state && window.history.state.page && window.history.state.page !== window.currentPage) {
      var prevPage = window.history.state.page;
      var prevSub  = window.history.state.sub;
      if (typeof go === 'function') go(prevPage, prevSub, false);
    } else {
      // Fall back to history.back() only as last resort
      window.history.back();
    }
  }

  // ── Touch state ──
  var sx = 0, sy = 0, st = 0;
  var locked = false;
  var isEdge = false;
  var edgeSide = '';
  var drawerOpen = false;

  document.addEventListener('touchstart', function (e) {
    var t = e.touches[0];
    sx = t.clientX; sy = t.clientY; st = Date.now();
    locked = false; isEdge = false; edgeSide = '';
    drawerOpen = drawer.classList.contains('open');
    _swipeLock = false;
    var W = window.innerWidth;
    if (sx < EDGE_ZONE)         { isEdge = true; edgeSide = 'left'; }
    else if (sx > W - EDGE_ZONE){ isEdge = true; edgeSide = 'right'; }
  }, { passive: true });

  document.addEventListener('touchmove', function (e) {
    if (locked) return;
    var dx = Math.abs(e.touches[0].clientX - sx);
    var dy = Math.abs(e.touches[0].clientY - sy);
    // Lock out if clearly vertical scroll
    if (dy > 10 && dy > dx * 1.5) locked = true;
  }, { passive: true });

  document.addEventListener('touchend', function (e) {
    if (locked || _swipeLock) return;
    var t   = e.changedTouches[0];
    var dx  = t.clientX - sx;
    var dy  = t.clientY - sy;
    var dt  = Date.now() - st;
    var adx = Math.abs(dx);
    var ady = Math.abs(dy);

    if (dt  > TIME_MAX)      return; // too slow
    if (adx < SWIPE_MIN)     return; // too short
    if (ady / adx > 0.65)   return; // too diagonal

    _swipeLock = true; // block any double-fire within same gesture

    // 1. Close open drawer with left swipe
    if (drawerOpen && dx < 0) { closeRightDrawer(); return; }

    // 2. Right-edge swipe LEFT → open nav drawer
    if (isEdge && edgeSide === 'right' && dx < 0) {
      openRightDrawer(); return;
    }

    // 3. Left-edge swipe RIGHT → go back
    // Call go() directly instead of history.back() — zero lag, no double render
    if (isEdge && edgeSide === 'left' && dx > 0) {
      if (typeof go === 'function') {
        window.history.back(); // let popstate in app.js handle it cleanly
      }
      return;
    }

    // 4. Regular page swipe (only on main nav pages)
    var page = window.currentPage || 'home';
    var idx  = NAV_PAGES.indexOf(page);
    if (idx === -1) return; // not a swipeable page (quiz, flashcards etc)

    if (dx < 0 && idx < NAV_PAGES.length - 1) {
      // Swipe LEFT → next page
      var next = NAV_PAGES[idx + 1];
      showDots(next);
      if (typeof go === 'function') go(next);
    } else if (dx > 0 && idx > 0) {
      // Swipe RIGHT → previous page
      var prev = NAV_PAGES[idx - 1];
      showDots(prev);
      if (typeof go === 'function') go(prev);
    }
  }, { passive: true });

})();
</script>
