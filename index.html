<script>
(function() {
  const root = document.documentElement;
  let metaTheme = document.querySelector('meta[name="theme-color"]');

  // Force dark mode permanently
  root.setAttribute('data-theme', 'dark');
  if (metaTheme) {
    metaTheme.setAttribute('content', '#05080F'); 
  }
  
  document.addEventListener('DOMContentLoaded', function() {
    document.body.classList.add('no-transition');
    setTimeout(function() {
      document.body.classList.remove('no-transition');
    }, 100);
  });
})();
</script>

function toast(msg, color) {
  var t = document.createElement("div");
  t.className = "toast";
  t.innerText = msg;
  document.getElementById("tc").appendChild(t);
  
  t.animate([
    { opacity: 0, transform: 'translate(-50%, 20px)' },
    { opacity: 1, transform: 'translate(-50%, 0)' }
  ], { duration: 300, easing: 'cubic-bezier(0.4,0,0.2,1)' });

  setTimeout(function(){ 
    var anim = t.animate([
      { opacity: 1, transform: 'translate(-50%, 0)' },
      { opacity: 0, transform: 'translate(-50%, 20px)' }
    ], { duration: 300, easing: 'ease' });
    
    anim.onfinish = () => t.remove();
  }, 3000);
}

// ── UNIFIED DRAWER CONTROL ENGINE ──
window.openDrawer = function() {
  var drawer = document.getElementById('nb-mobile-drawer');
  var overlay = document.getElementById('nb-mobile-overlay');
  var hamburger = document.getElementById('nb-hamburger');
  if(drawer) drawer.classList.add('open');
  if(overlay) overlay.classList.add('open');
  if(hamburger) hamburger.classList.add('active');
};

window.closeDrawer = function() {
  var drawer = document.getElementById('nb-mobile-drawer');
  var overlay = document.getElementById('nb-mobile-overlay');
  var hamburger = document.getElementById('nb-hamburger');
  if(drawer) drawer.classList.remove('open');
  if(overlay) overlay.classList.remove('open');
  if(hamburger) hamburger.classList.remove('active');
};

window.toggleDrawer = function() {
  var drawer = document.getElementById('nb-mobile-drawer');
  if(drawer && drawer.classList.contains('open')) {
    window.closeDrawer();
  } else {
    window.openDrawer();
  }
};

document.addEventListener('keydown', function(event) {
  if (event.key === 'Escape') window.closeDrawer();
});

function initializeApp() {
  var nbLogo = document.getElementById('nb-logo-svg');
  if(nbLogo && typeof makeLogo === 'function') {
      nbLogo.innerHTML = ""; 
      nbLogo.appendChild(makeLogo(34));
  }
  
  if (typeof loadCurrentAffairs === 'function') {
      loadCurrentAffairs(); 
  }
  
  if (typeof render === "function") {
      render();
  }

  var loader = document.getElementById('app-loader');
  if (loader) {
      loader.style.opacity = '0';
      setTimeout(function() { loader.remove(); }, 400);
  }
  if (typeof checkInitialSetup === 'function') {
      checkInitialSetup();
  }
  if (typeof AppTour !== 'undefined') {
      AppTour.init();
  }
}

window.QD = {}; 

function fetchQuestionsAndStart() {
  const SHEET_URLS = [
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcBWlFTv2n-_i5YFQZNee2YF9ACG0cn6SjCEYfwkp2518wfJJx7-VMPSv_dXNKtS5cst0S8u3FRlHA/pub?gid=263668087&single=true&output=csv",
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcBWlFTv2n-_i5YFQZNee2YF9ACG0cn6SjCEYfwkp2518wfJJx7-VMPSv_dXNKtS5cst0S8u3FRlHA/pub?gid=767959018&single=true&output=csv",
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcBWlFTv2n-_i5YFQZNee2YF9ACG0cn6SjCEYfwkp2518wfJJx7-VMPSv_dXNKtS5cst0S8u3FRlHA/pub?gid=531099395&single=true&output=csv",
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcBWlFTv2n-_i5YFQZNee2YF9ACG0cn6SjCEYfwkp2518wfJJx7-VMPSv_dXNKtS5cst0S8u3FRlHA/pub?gid=1407790517&single=true&output=csv",
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcBWlFTv2n-_i5YFQZNee2YF9ACG0cn6SjCEYfwkp2518wfJJx7-VMPSv_dXNKtS5cst0S8u3FRlHA/pub?gid=337186880&single=true&output=csv",
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcBWlFTv2n-_i5YFQZNee2YF9ACG0cn6SjCEYfwkp2518wfJJx7-VMPSv_dXNKtS5cst0S8u3FRlHA/pub?gid=216502792&single=true&output=csv",
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcBWlFTv2n-_i5YFQZNee2YF9ACG0cn6SjCEYfwkp2518wfJJx7-VMPSv_dXNKtS5cst0S8u3FRlHA/pub?gid=1795942396&single=true&output=csv",
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcBWlFTv2n-_i5YFQZNee2YF9ACG0cn6SjCEYfwkp2518wfJJx7-VMPSv_dXNKtS5cst0S8u3FRlHA/pub?gid=393325687&single=true&output=csv"
  ];
  
  let completedRequests = 0;
  let hasErrors = false;

  SHEET_URLS.forEach(function(url) {
    // 1. Generate a unique timestamp
    let uniqueTimestamp = new Date().getTime();
    
    // 2. Append it to the URL to bypass browser and device caching
    let freshUrl = url + "&nocache=" + uniqueTimestamp;

    // 3. Pass the 'freshUrl' into Papa.parse instead of the original 'url'
    Papa.parse(freshUrl, {
      download: true, header: true, skipEmptyLines: true,
      complete: function(results) {
        results.data.forEach(function(row) {
          let subject = row["Subject"];
          if (!subject) return; 
          subject = subject.trim();
          if (!window.QD[subject]) window.QD[subject] = [];
          window.QD[subject].push({
            topic: row["Topic"], q: row["Question"],
            o: [row["Option 1"], row["Option 2"], row["Option 3"], row["Option 4"]],
            a: parseInt(row["Correct Answer (0-3)"])
          });
        });
        completedRequests++;
        if (completedRequests === SHEET_URLS.length && !hasErrors) {
          window.totalQuestions = Object.values(window.QD).reduce((sum, subjectArray) => sum + subjectArray.length, 0);
          initializeApp();
        }
      },
      error: function(err) {
        hasErrors = true;
        alert("Failed to load some study material. Please check your connection.");
      }
    });
  });
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', fetchQuestionsAndStart);
} else {
  fetchQuestionsAndStart(); 
}
</script>

<!-- ── SWIPE NAVIGATION ENGINE ── -->
<style>
#sl-page-dots { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; align-items: center; z-index: 9000; pointer-events: none; opacity: 0; transition: opacity 0.35s ease; }
#sl-page-dots.visible { opacity: 1; }
#sl-page-dots .sl-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.22); transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); }
#sl-page-dots .sl-dot.active { width: 20px; border-radius: 4px; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
</style>

<script>
(function () {
  var NAV_PAGES = ['home', 'govtupdates', 'shorts', 'digest', 'daily'];
  var EDGE_ZONE = 28;  
  var SWIPE_MIN = 48;  
  var TIME_MAX  = 400; 
  var _swipeLock = false; 

  var bar = document.createElement('div');
  bar.id = 'sl-page-dots';
  NAV_PAGES.forEach(function () {
    var d = document.createElement('div');
    d.className = 'sl-dot';
    bar.appendChild(d);
  });
  document.body.appendChild(bar);

  var _dotTimer = null;
  function showDots(page) {
    var idx = NAV_PAGES.indexOf(page);
    if (idx === -1) { bar.classList.remove('visible'); return; }
    bar.classList.add('visible');
    bar.querySelectorAll('.sl-dot').forEach(function (d, i) { d.classList.toggle('active', i === idx); });
    clearTimeout(_dotTimer);
    _dotTimer = setTimeout(function () { bar.classList.remove('visible'); }, 2000);
  }

  var _lastPage = null;
  setInterval(function () {
    var p = window.currentPage || 'home';
    if (p !== _lastPage) { _lastPage = p; showDots(p); }
  }, 100);

  var sx = 0, sy = 0, st = 0;
  var locked = false, isEdge = false, edgeSide = '';

  document.addEventListener('touchstart', function (e) {
    var t = e.touches[0];
    sx = t.clientX; sy = t.clientY; st = Date.now();
    locked = false; isEdge = false; edgeSide = '';
    _swipeLock = false;
    var W = window.innerWidth;
    if (sx < EDGE_ZONE)         { isEdge = true; edgeSide = 'left'; }
    else if (sx > W - EDGE_ZONE){ isEdge = true; edgeSide = 'right'; }
  }, { passive: true });

  document.addEventListener('touchmove', function (e) {
    if (locked) return;
    var dx = Math.abs(e.touches[0].clientX - sx);
    var dy = Math.abs(e.touches[0].clientY - sy);
    if (dy > 10 && dy > dx * 1.5) locked = true;
  }, { passive: true });

  document.addEventListener('touchend', function (e) {
    if (locked || _swipeLock) return;
    var t   = e.changedTouches[0];
    var dx  = t.clientX - sx;
    var dy  = t.clientY - sy;
    var dt  = Date.now() - st;
    var adx = Math.abs(dx);
    var ady = Math.abs(dy);

    if (dt  > TIME_MAX)      return; 
    if (adx < SWIPE_MIN)     return; 
    if (ady / adx > 0.65)   return; 

    _swipeLock = true; 

    var drawerOpen = document.getElementById('nb-mobile-drawer') && document.getElementById('nb-mobile-drawer').classList.contains('open');

    // 1. Close drawer with left swipe
    if (drawerOpen && dx < 0) { window.closeDrawer(); return; }

    // 2. Open drawer with right-edge left swipe
    if (isEdge && edgeSide === 'right' && dx < 0) {
      window.openDrawer(); return;
    }

    // 3. Go back with left-edge right swipe
    if (isEdge && edgeSide === 'left' && dx > 0) {
      if (typeof go === 'function') {
        // If they are deep in the app, safely route them back to home
        if (window.currentPage && window.currentPage !== 'home') {
            go('home'); 
        } else {
            // If they are already on home, trigger native back (which fires your exit modal)
            window.history.back(); 
        }
      }
      return;
    }

    // 4. Regular page swipe
    var page = window.currentPage || 'home';
    var idx  = NAV_PAGES.indexOf(page);
    if (idx === -1) return; 

    if (dx < 0 && idx < NAV_PAGES.length - 1) {
      var next = NAV_PAGES[idx + 1];
      showDots(next);
      if (typeof go === 'function') go(next);
    } else if (dx > 0 && idx > 0) {
      var prev = NAV_PAGES[idx - 1];
      showDots(prev);
      if (typeof go === 'function') go(prev);
    }
  }, { passive: true });

})();
</script>
